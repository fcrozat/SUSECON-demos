# MCPHost Configuration File
# All command-line flags can be configured here

# MCP Servers configuration

# Application settings
#model: "google/gemini-2.5-pro" # Or "google:gemini-2.0-pro" if you want
model: "google/gemini-3.1-flash-lite-preview" # Or "google:gemini-2.0-pro" if you want
#model: "google/gemini-3.1-pro-preview" # Or "google:gemini-2.0-pro" if you want
max-steps: 20
debug: false
quiet: true

# Model generation parameters
#max-tokens: 4096
#temperature: 0.7
#top-p: 0.95
#top-k: 40
# stop-sequences: ["Human:", "Assistant:"]     # Custom stop sequences

system-prompt: /home/susecon/system-prompt.md

# API Configuration
mcpServers:
  filesystem_ro:
    type: builtin
    name: fs
    options:
      allowed_directories: ["/etc", "/tmp", "/usr/lib", "/usr/etc", "/proc"]
      allowedTools: ["read_file", "list_directory"]
  filesystem_playground:
    type: builtin
    name: fs
    options:
      allowed_directories: ["/home/susecon/playground"]

  bash-commands:
    type: builtin
    name: bash
  web-fetcher:
    type: builtin
    name: http
  systemd:
    command: mcp-server-systemd
  prompt:
    command: mcp-server-user-prompt
  ansible_linux_roles:
    type: local
    command: ["/home/susecon/mcp-linux-system-roles/server/server.py"]
    allowedTools:
      ["run_system_role", "list_available_roles", "get_role_documentation"]
